<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sala de Espera - Centro de Salud</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .pantalla {
            background-color: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 700px;
        }
        h1 {
            color: #343a40;
            margin-bottom: 10px;
        }
        .subtitulo {
            color: #6c757d;
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        #llamado-box {
            font-size: 2.5em;
            color: #dc3545;
            font-weight: bold;
            padding: 30px;
            border: 4px dashed #dc3545;
            border-radius: 10px;
            display: none; /* Oculto hasta que llegue un mensaje */
            background-color: #fff3f3;
        }
        #estado {
            margin-top: 30px;
            font-weight: bold;
            color: #ffc107;
        }
    </style>
</head>
<body>

    <div class="pantalla">
        <h1>Sala de Espera</h1>
        <div class="subtitulo">Por favor, espere su turno mirando esta pantalla.</div>
        
        <div id="llamado-box"></div>
        
        <div id="estado">Iniciando conexión con el servidor...</div>
    </div>

    <script>
        // Apuntamos al API Gateway (Nginx) en el puerto 8080, ruta /tickets/ws
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`ws://localhost:8080/tickets/ws`);
        
        const llamadoBox = document.getElementById("llamado-box");
        const estadoDiv = document.getElementById("estado");

        // Evento: Cuando la conexión es exitosa
        socket.onopen = function(e) {
            estadoDiv.textContent = "🟢 Conectado al sistema central (WebSocket Activo)";
            estadoDiv.style.color = "#28a745";
        };

        // Evento: Cuando el servidor envía un mensaje (El médico llama)
        socket.onmessage = function(event) {
            // Mostramos el contenedor y ponemos el texto del servidor
            llamadoBox.style.display = "block";
            llamadoBox.textContent = event.data;

            // Efecto visual: Hacemos parpadear el recuadro para llamar la atención
            let parpadeos = 0;
            let intervalo = setInterval(() => {
                llamadoBox.style.opacity = (llamadoBox.style.opacity == 0 ? 1 : 0);
                parpadeos++;
                if (parpadeos >= 6) {
                    clearInterval(intervalo);
                    llamadoBox.style.opacity = 1; // Lo dejamos visible
                }
            }, 300);
        };

        // Evento: Si se pierde la conexión
        socket.onclose = function(event) {
            estadoDiv.textContent = "🔴 Desconectado del servidor.";
            estadoDiv.style.color = "#dc3545";
        };

        // Evento: Si hay un error
        socket.onerror = function(error) {
            estadoDiv.textContent = "❌ Error de conexión. Revisa que Docker esté corriendo.";
            estadoDiv.style.color = "#dc3545";
        };
    </script>
</body>
</html>

events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=zona_segura:10m rate=5r/s;

    # Bloque 1: Redirección obligatoria de HTTP a HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host:8443$request_uri;
    }

    # Bloque 2: Servidor Seguro HTTPS
    server {
        listen 443 ssl;
        server_name localhost;

        # Configuración SSL
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        # FRONTEND (Público, sin clave)
        location / {
            proxy_pass http://app_frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # CLÍNICA / AGENDA (Público, protegido por Rate Limit)
        location /agenda/ {
            limit_req zone=zona_segura burst=10 nodelay;
            proxy_pass http://app_agenda:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # TICKETS (WebSockets)
        location /tickets/ {
            proxy_pass http://app_tickets:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # LABORATORIO (¡Privado! Pide Usuario y Contraseña)
        location /laboratorio/ {
            # Elemento de seguridad: Autenticación Básica
            auth_basic "Acceso Restringido - Personal Medico";
            auth_basic_user_file /etc/nginx/.htpasswd;

            limit_req zone=zona_segura burst=10 nodelay;
            proxy_pass http://app_laboratorio:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
